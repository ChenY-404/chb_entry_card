<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>动态进校凭证</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f0f0f0;
  }
  canvas {
    border: 1px solid #ccc;
  }
</style>
</head>
<body>
<canvas id="entryCard" width="600" height="800"></canvas>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
const canvas = document.getElementById("entryCard");
const ctx = canvas.getContext("2d");

// 模板图片
const templateImg = new Image();
templateImg.src = "https://i.ibb.co/7y6G9Rb/8d463e16-7b43-49f9-beb1-9b05f044c9d1.jpg"; // 你可以换成本地或网络图片

templateImg.onload = () => {
    updateCanvas();
    setInterval(updateCanvas, 1000); // 每秒更新
};

function updateCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);

    const now = new Date();
    const entryDate = now.toISOString().split("T")[0]; // yyyy-mm-dd
    const qrTime = now.toISOString().replace("T", " ").split(".")[0]; // yyyy-mm-dd hh:mm:ss

    // 写入进校日期
    ctx.font = "28px sans-serif";
    ctx.fillStyle = "white";
    ctx.fillText(entryDate, 200, 200); // 坐标可调

    // 生成二维码
    const qrCanvas = document.createElement("canvas");
    QRCode.toCanvas(qrCanvas, `校外访客 ${qrTime}`, { color: { dark: "#008000", light: "#ffffff" }, width: 200 }, function (error) {
        if (error) console.error(error);
        // 粘贴二维码
        ctx.drawImage(qrCanvas, 150, 250); // 二维码位置
        // 在二维码上写时间
        ctx.fillStyle = "black";
        ctx.font = "20px sans-serif";
        ctx.fillText(qrTime, 200, 470); // 二维码时间位置
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态进校凭证</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      padding: 12px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="card" width="1290" height="2796"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("card");
    const ctx = canvas.getContext("2d");

    const bg = new Image();
    bg.src = "bg.jpg"; // 你的背景图文件名

    // 固定二维码图片。如果你已经有二维码图片，上传到仓库并命名为 qr.png
    const qrImg = new Image();
    qrImg.src = "qr.png";

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function formatDate(now) {
      return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
    }

    function formatTime(now) {
      return `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }

    function draw() {
      if (!bg.complete) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

      const now = new Date();
      const entryDate = formatDate(now);
      const timeText = formatTime(now);

      // ===== 这里是你需要微调的位置 =====
      // 进校日期
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 54px sans-serif";
      ctx.fillText(entryDate, 470, 930);

      // 二维码上方时间
      ctx.fillStyle = "#333333";
      ctx.font = "bold 44px sans-serif";
      ctx.fillText(timeText, 500, 1870);

      // 固定二维码
      if (qrImg.complete && qrImg.naturalWidth > 0) {
        ctx.drawImage(qrImg, 360, 1940, 560, 560);
      }
    }

    bg.onload = () => {
      draw();
      setInterval(draw, 1000);
    };

    qrImg.onload = draw;
  </script>
</body>
</html>
